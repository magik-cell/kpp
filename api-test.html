<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Test</h1>
    <div>
        <h3>Login Test:</h3>
        <button onclick="testLogin()">Test Login</button>
        <div id="loginResult"></div>
    </div>
    
    <div>
        <h3>Vehicles Test:</h3>
        <button onclick="testVehicles()">Test Vehicles</button>
        <div id="vehiclesResult"></div>
    </div>

    <script>
        async function testLogin() {
            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'test_unit',
                        password: 'password123'
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('authToken', result.token);
                    document.getElementById('loginResult').innerHTML = 
                        `<p style="color: green">Login successful! Token: ${result.token.substring(0, 20)}...</p>`;
                } else {
                    document.getElementById('loginResult').innerHTML = 
                        `<p style="color: red">Login failed: ${result.error}</p>`;
                }
            } catch (error) {
                document.getElementById('loginResult').innerHTML = 
                    `<p style="color: red">Network error: ${error.message}</p>`;
            }
        }

        async function testVehicles() {
            try {
                const token = localStorage.getItem('authToken');
                if (!token) {
                    document.getElementById('vehiclesResult').innerHTML = 
                        `<p style="color: red">No token found. Please login first.</p>`;
                    return;
                }
                
                const response = await fetch('http://localhost:5000/api/vehicles', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('vehiclesResult').innerHTML = 
                        `<p style="color: green">Vehicles loaded: ${result.vehicles.length} vehicles</p>
                         <pre>${JSON.stringify(result, null, 2)}</pre>`;
                } else {
                    document.getElementById('vehiclesResult').innerHTML = 
                        `<p style="color: red">Vehicles failed: ${result.error}</p>`;
                }
            } catch (error) {
                document.getElementById('vehiclesResult').innerHTML = 
                    `<p style="color: red">Network error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
