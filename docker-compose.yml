services:
  # База даних MongoDB - використовуємо локальну MongoDB
  # db: відключено - використовуємо host.docker.internal:27017

  # Серверна частина (API)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kyrsova_server
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://host.docker.internal:27017/kpp_control
      JWT_SECRET: your_super_secret_jwt_key_here_2024
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    networks:
      - kyrsova_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./server/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Клієнтська частина (React)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: kyrsova_client
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - kyrsova_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

# Створюємо мережу для контейнерів
networks:
  kyrsova_network:
    driver: bridge
    name: kyrsova_network

# Створюємо том для збереження даних бази
volumes:
  mongo_data:
    driver: local
    name: kyrsova_mongo_data