services:
  - type: web
    name: kpp-control-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: BCRYPT_ROUNDS
        value: "10"
      - key: NODE_ENV
        value: "production"
    # NOTE: Set these in the Render Dashboard (Settings → Environment):
    # - MONGODB_URI=mongodb+srv://sasha:Password123@cluster0.pzthh8n.mongodb.net/kpp_control?retryWrites=true&w=majority
    # - JWT_SECRET=your_super_secret_jwt_key_here_2024

  - type: static_site
    name: kpp-control-client
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://my-kyrsova-2.onrender.com/api
